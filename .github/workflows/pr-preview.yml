name: PR — preview + e2e

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  build-and-preview:
    name: Build + deploy preview
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    outputs:
      preview_url: ${{ steps.deploy.outputs.details_url }}
      preview_skipped: ${{ steps.gate.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4

      - id: gate
        name: Gate on Firebase secrets being configured
        env:
          HAS_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
          HAS_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID != '' }}
        run: |
          if [ "$HAS_SA" = "true" ] && [ "$HAS_PROJECT" = "true" ]; then
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          else
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "::notice::FIREBASE_SERVICE_ACCOUNT or FIREBASE_PROJECT_ID secret not set — skipping preview deploy."
          fi

      - if: steps.gate.outputs.skipped == 'false'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - if: steps.gate.outputs.skipped == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - if: steps.gate.outputs.skipped == 'false'
        run: pnpm install --frozen-lockfile

      - if: steps.gate.outputs.skipped == 'false'
        name: Build web
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: pnpm --filter web build

      - if: steps.gate.outputs.skipped == 'false'
        id: deploy
        name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: pr-${{ github.event.number }}
          expires: 7d

  e2e:
    name: Playwright E2E
    needs: build-and-preview
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Build web (for fallback preview server)
        if: needs.build-and-preview.outputs.preview_skipped == 'true'
        env:
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: placeholder
          VITE_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
        run: pnpm --filter web build

      - name: Run Playwright (against preview URL when available)
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.build-and-preview.outputs.preview_skipped == 'false' && needs.build-and-preview.outputs.preview_url || '' }}
        run: pnpm --filter web e2e

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
