name: PR — preview + e2e

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  build-and-preview:
    name: Build + deploy preview
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    outputs:
      preview_url: ${{ steps.deploy.outputs.details_url }}
      preview_skipped: ${{ steps.gate.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4

      - id: gate
        name: Gate on Firebase secrets being configured
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          set -u
          sa="${SA:-}"
          project="${PROJECT:-}"
          # Service-account secret must be non-empty JSON (must start with '{').
          # This catches placeholder/malformed values that GitHub stores as
          # non-empty strings but that Firebase cannot parse.
          first_char="${sa:0:1}"
          if [ -n "$project" ] && [ -n "$sa" ] && [ "$first_char" = "{" ]; then
            echo "skipped=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Firebase secrets look valid — preview deploy will run."
          else
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Firebase secrets missing or malformed — skipping preview deploy. (Set FIREBASE_SERVICE_ACCOUNT and FIREBASE_PROJECT_ID; the service account must be the full JSON starting with '{')"
          fi

      - if: steps.gate.outputs.skipped == 'false'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - if: steps.gate.outputs.skipped == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - if: steps.gate.outputs.skipped == 'false'
        run: pnpm install --frozen-lockfile

      - if: steps.gate.outputs.skipped == 'false'
        name: Build web
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: pnpm --filter web build

      - if: steps.gate.outputs.skipped == 'false'
        id: deploy
        name: Deploy preview channel
        continue-on-error: true
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: pr-${{ github.event.number }}
          expires: 7d

  e2e:
    name: Playwright E2E
    needs: build-and-preview
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      # Always build locally so the Playwright fallback webServer (vite preview)
      # has a dist/ to serve. Uses placeholders so build is reproducible even
      # when Firebase config secrets are unset or invalid.
      - name: Build web for E2E
        env:
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: placeholder
          VITE_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000000000000:web:0000000000000000000000'
        run: pnpm --filter web build

      # Use the preview URL if the deploy actually produced one; otherwise
      # Playwright config will fall back to spawning vite preview locally.
      - name: Run Playwright
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.build-and-preview.outputs.preview_url || '' }}
        run: pnpm --filter web e2e

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
